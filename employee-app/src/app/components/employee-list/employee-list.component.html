<h2>Employees</h2>
<h2>Employee List Loaded</h2>
<table border="1">

<tr>
<th>Id</th>
<th>Name</th>
<th>Department</th>
<th>Salary</th>
<th>Action</th>
</tr>

<tr *ngFor="let e of employees">

<td>{{e.id}}</td>
<td>{{e.name}}</td>
<td>{{e.department}}</td>
<td>{{e.salary}}</td>

<td>
<button (click)="delete(e.id)">Delete</button>
</td>

</tr>

</table>
